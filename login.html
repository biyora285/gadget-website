    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;
            background-color:#D2D8E3;
        }

        h1{
            text-align:center;

        nav a:hover{
            background:#D2D8E3;
        }

        .login-box{
            width:380px;
            background:white;
            margin:40px auto;
            padding:30px;
            border-radius:12px;

        .login-box h2{
            text-align:center;
            color:#234388;
        }

        label{
            font-weight:bold;
            color:#234388;
        }

            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:6px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#234388;
            color:white;
            border:none;
            border-radius:6px;
            font-size:17px;
            cursor:pointer;
        }

        button:hover{
            background:#3E5FB0;
        }

        .links{
            text-align:center;
            margin-top:15px;
        }

        .links a{
            color:#234388;
            text-decoration:none;
            font-weight:bold;
        }

        footer{
            background:#234388;
            color:white;
            text-align:center;
            padding:20px;
